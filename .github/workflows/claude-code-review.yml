name: Claude PR Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          settings: |
            {
              "permissions": {
                "allow": ["Bash"]
              }
            }
          show_full_output: true
          prompt: |
            You are a senior software engineer reviewing the changes in this pull request for an Angular 19 application.
            Your goal is to ensure high code quality, maintainability, and correctness before production merge.

            IMPORTANT: Do NOT invoke the /review slash command or any skill. You already have the PR diff and context.
            Instead, use `gh pr diff` and `gh pr view` directly via Bash, then post a review with `gh pr review --request-changes` and inline comments.

            ## Review focus
            - Angular best practices
            - TypeScript correctness and strict typing
            - Code readability and maintainability
            - Performance considerations
            - Async handling and subscription safety
            - Error handling and edge cases
            - Security concerns (e.g. unsafe data usage)
            - Unnecessary or debugging code (e.g. console logs)

            ## Output behavior
            - Leave inline GitHub review comments on specific lines where issues are found
            - Be clear, actionable, and specific in feedback
            - Explain why something is an issue when relevant
            - Suggest improved alternatives when possible
            - Group minor issues when appropriate instead of duplicating comments

            ## Review decision
            - If no issues are found, submit an APPROVING review: `gh pr review --approve`
            - If any issue exists, request changes: `gh pr review --request-changes --body "..."` with inline comments

            ## Style
            - Be concise but thorough
            - Prefer actionable improvements over general observations
            - Do not summarize only — actively comment on code issues