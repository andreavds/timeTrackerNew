<div class="d-flex align-items-center justify-content-between">
  <div class="branding">
    <app-branding [collapsed]="collapsed" [opened]="opened" [isMobileScreen]="isMobileScreen"></app-branding>
  </div>

  @if(showToggle) {
  <a
    href="javascript:void(0)"
    (click)="toggleMobileNav.emit()"
    class="d-flex justify-content-center ng-star-inserted icon-40 align-items-center f-s-14"
  >
    <i-tabler name="x" class="icon-20 d-flex m-r-16"></i-tabler>
  </a>
  }
</div>
